# ─── Shared / Inheritable ─────────────────────────────────────────────────────
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# ─── Production ───────────────────────────────────────────────────────────────
[env.production]
name = "mnemom-gateway"
# CF Workers Paid Standard ($5/month) plan required: Ed25519 signing + CFD L1 pattern matching
# + AIP analysis can exceed 10ms bundled CPU. Standard plan provides 30s CPU per invocation.
usage_model = "standard"

# Emit Worker trace events to the workers_trace_events Logpush dataset.
# ADR-026: Tier 2 (AI Gateway audit) + Tier 3 (Worker exec traces) both
# depend on this — AI Gateway enriches this Worker's trace events with
# encrypted Metadata/RequestBody/ResponseBody, and console.log/exceptions
# flow to mnemom-worker-logs R2 for operational debugging.
logpush = true

routes = [
  { pattern = "gateway.mnemom.ai", custom_domain = true }
]

workers_dev = true

[env.production.vars]
GATEWAY_VERSION = "2.0.0"
BILLING_ENFORCEMENT_ENABLED = "true"
SAFE_HOUSE_ENABLED = "true"   # Enables Safe House DB lookups; per-agent mode controlled via cfd_configs table
# Phase 5 Stage 5B: Detection recipe tier1 evaluation in shadow mode.
# Zero verdict impact — emits `sh_recipes` structured log per inbound
# request in the Safe House enforce branch. Every failure path fails open.
# Flip to "enforce" requires Stage 5D verdict-contribution work (not this PR).
RECIPE_MODE = "shadow"

[[env.production.kv_namespaces]]
binding = "BILLING_CACHE"
id = "d13bd450c5ab4a2c9766f2dc26ce513c"

# Secrets (set via: wrangler secret put <NAME> --env production):
# SUPABASE_URL (op://mnemom-urls/supabase-url/credential)
# SUPABASE_SECRET_KEY (modern "sb_secret_..." format, server-side role;
#   op://mnemom-api-keys/supabase-production-secret-api-key/credential.
#   Replaces legacy JWT SUPABASE_KEY.)
# CF_AI_GATEWAY_URL
# ANTHROPIC_API_KEY, CF_AIG_TOKEN
# OTLP_ENDPOINT, OTLP_AUTH
# MNEMOM_ANALYZE_URL, MNEMOM_API_KEY, MNEMOM_LICENSE_JWT
# ED25519_SIGNING_KEY, ED25519_KEY_ID
# PROVER_URL, PROVER_API_KEY
# INTERNAL_API_KEY  ← shared service key for POST /internal/agents on mnemom-api (scale/step-25b)

# ─── Staging ──────────────────────────────────────────────────────────────────
[env.staging]
name = "mnemom-gateway-staging"

# See ADR-026 — opt in to workers_trace_events for Tier 2 + Tier 3.
logpush = true

routes = [
  { pattern = "gateway-staging.mnemom.ai", custom_domain = true }
]

workers_dev = true

[env.staging.vars]
GATEWAY_VERSION = "2.0.0"
BILLING_ENFORCEMENT_ENABLED = "false"
SAFE_HOUSE_ENABLED = "true"
# Phase 5 Stage 5B: Detection recipe tier1 evaluation in shadow mode.
# Zero verdict impact — emits `sh_recipes` structured log per inbound
# request in the Safe House enforce branch. Production stays `off` until
# we've reviewed shadow telemetry per the correctness gate.
RECIPE_MODE = "shadow"
# Sovereign agent recommended Safe House config (set via /v1/agents/:id/cfd/config):
# mode: enforce, screen_surfaces: all, thresholds: 0.5/0.70/0.85
# Canaries: POST /v1/cfd/canaries for each primary tool credential

[[env.staging.kv_namespaces]]
binding = "BILLING_CACHE"
id = "2310e7878a364496b397b88540923c1f"

# Secrets (set via: wrangler secret put <NAME> --env staging):
# SUPABASE_URL (op://mnemom-urls/supabase-staging-project-url/credential)
# SUPABASE_SECRET_KEY (op://mnemom-api-keys/supabase-staging-secret-api-key/credential)
# CF_AI_GATEWAY_URL (mnemom-staging gateway)
# ANTHROPIC_API_KEY, CF_AIG_TOKEN
# OTLP_ENDPOINT, OTLP_AUTH
# ED25519_SIGNING_KEY, ED25519_KEY_ID
# INTERNAL_API_KEY  ← shared service key for POST /internal/agents on mnemom-api (scale/step-25b)
