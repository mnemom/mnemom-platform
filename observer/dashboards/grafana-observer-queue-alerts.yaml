# Alert rules for the mnemom-observer queue pipeline — Step 52, ADR-032 +
# ADR-043.
#
# All four rules are now uniform Prometheus spanmetrics alerts, importable
# via Grafana Cloud → Alerting → Alert rules → Import Prometheus alert rules,
# pointed at grafanacloud-mnemom-prom. The underlying series
# (`traces_spanmetrics_*`) are populated by Grafana's metrics-generator from
# the spans observer emits on the /v1/traces route.
#
# History — why the rules look the same shape now: the original Step 52 cut
# (PR #178) tried direct OTLP /v1/metrics; ADR-032 pivoted to span-derived
# observability; PRs #188 + #189 shipped that. The three depth/lag alerts
# were intended as Tempo TraceQL rules. On 2026-04-28 we discovered Grafana
# SSE cannot accept TraceQL metrics output (long-format vs. wide-format
# data-frame mismatch), so ADR-043 converted those three gauges into
# threshold-breach spans. Each emits a separate span name on threshold
# crossing; spanmetrics rolls them into per-name counters; alerts now mirror
# ObserverPoisonAckRate exactly.
#
# Source spans emitted by observer/src/metrics.ts:
#
#   observer.queue_batch                 (one per MessageBatch; attrs: env,
#                                          mode, gateway_id, batch_size,
#                                          processed, skipped, acks_on_missing,
#                                          poison_acks, retries,
#                                          oldest_message_lag_ms; status=ERROR
#                                          if poison_acks > 0)
#   observer.queue_poison                (one per poison-acked message)
#   observer.queue_backlog               (one per queue per scheduled() tick;
#                                          attrs: env, queue, gateway_id,
#                                          depth)
#   observer.queue_backlog_breach        (ADR-043 — emitted only when
#                                          queue=main and depth > 50000)
#   observer.queue_dlq_breach            (ADR-043 — emitted only when
#                                          queue=dlq and depth > 0)
#   observer.queue_consumer_lag_breach   (ADR-043 — emitted only when a
#                                          queue_batch's oldest_message_lag_ms
#                                          exceeds 600000)
#
# The non-breach spans keep emitting unchanged so Tempo trace search remains
# the smooth-gauge view for incident triage.
#
# Severity maps to our two-tier setup (critical=P0 page, high=P1 Slack).

groups:
  - name: mnemom-observer-queue-prometheus
    interval: 1m
    rules:

      # ─── Poison-ack rate > 0 sustained (consumer dropping messages) ─────────
      - alert: ObserverPoisonAckRate
        expr: |
          sum by (gateway_id) (
            rate(traces_spanmetrics_calls_total{
              service_name="mnemom-observer",
              span_name="observer.queue_poison"
            }[15m])
          ) > 0
        for: 15m
        labels:
          severity: high
          service: mnemom-observer
          area: observer-scale
        annotations:
          summary: Observer poison-acks > 0/s sustained for 15m ({{ $labels.gateway_id }})
          description: |
            The consumer is acking messages as unrecoverable (decrypt /
            adapter / unknown-source failures) at a non-zero rate. Each
            poison-ack drops a trace permanently. Sustained poison acks
            usually mean a decryption-key mismatch on a new R2 object shape
            (rotate LOGPUSH_DECRYPT_PRIVATE_KEY or re-check the Logpush
            envelope format).
          runbook_url: https://github.com/mnemom/scale/blob/main/runbooks/observer-queue-metrics.md

      # ─── Main-queue backlog over threshold (consumer not draining) ──────────
      - alert: ObserverQueueBacklogHigh
        expr: |
          sum by (gateway_id) (
            rate(traces_spanmetrics_calls_total{
              service_name="mnemom-observer",
              span_name="observer.queue_backlog_breach"
            }[5m])
          ) > 0
        for: 5m
        labels:
          severity: high
          service: mnemom-observer
          area: observer-scale
        annotations:
          summary: Observer main queue backlog > 50k for 5m
          description: |
            Each emission of observer.queue_backlog_breach indicates the main
            queue's avg depth crossed 50000 messages on that scheduled() tick.
            Sustained signal means the consumer isn't draining: likely
            consumer crash-loop, Anthropic rate-limit, Supabase 5xx, or a
            recent deploy regression.
          runbook_url: https://github.com/mnemom/scale/blob/main/runbooks/observer-queue-metrics.md

      # ─── DLQ has any backlog ─────────────────────────────────────────────────
      - alert: ObserverDLQNonEmpty
        expr: |
          sum by (gateway_id) (
            rate(traces_spanmetrics_calls_total{
              service_name="mnemom-observer",
              span_name="observer.queue_dlq_breach"
            }[10m])
          ) > 0
        for: 10m
        labels:
          severity: high
          service: mnemom-observer
          area: observer-scale
        annotations:
          summary: Observer DLQ has backlogged message(s)
          description: |
            A message exhausted max_retries or was classified as poison that
            evaded the isPoisonError classifier. Inspect Tier 3 Worker logs
            for the message ID and decide whether to redrive or quarantine.
          runbook_url: https://github.com/mnemom/scale/blob/main/runbooks/observer-queue-metrics.md

      # ─── Consumer lag > 10m (Step 53 SLO breach) ────────────────────────────
      - alert: ObserverConsumerLagHigh
        expr: |
          sum by (gateway_id) (
            rate(traces_spanmetrics_calls_total{
              service_name="mnemom-observer",
              span_name="observer.queue_consumer_lag_breach"
            }[10m])
          ) > 0
        for: 10m
        labels:
          severity: high
          service: mnemom-observer
          area: observer-scale
        annotations:
          summary: Observer consumer lag > 10m
          description: |
            ADR-033: per-batch lag is captured at batch arrival as
            (Date.now() - min(message.timestamp)) on every queue_batch span.
            ADR-043: a counter-style observer.queue_consumer_lag_breach span
            fires when that value crosses 600000ms. Breach of Step 53's
            load-test SLO; often co-fires with ObserverQueueBacklogHigh.
          runbook_url: https://github.com/mnemom/scale/blob/main/runbooks/observer-queue-metrics.md

