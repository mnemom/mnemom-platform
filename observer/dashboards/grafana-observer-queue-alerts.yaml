# Prometheus-native alerting rules for the mnemom-observer queue pipeline.
# Step 52 — M6 Observer Scale.
#
# Format matches mnemom-api/dashboards/grafana-auth-alerts.yaml — import via
# Grafana Cloud → Alerting → Alert rules → Import Prometheus alert rules,
# pointed at the grafanacloud-mnemom-prom datasource. OTLP metrics arrive
# there after dots are rewritten to underscores by Grafana Cloud's OTLP
# gateway (observer.queue_depth → observer_queue_depth).
#
# Source metrics emitted by observer/src/metrics.ts:
#   - observer.queue_depth           (gauge, labels: queue, gateway_id)
#   - observer.consumer_lag_seconds  (gauge, labels: queue, gateway_id)
#   - observer.messages_processed    (counter, DELTA, labels: outcome, mode, gateway_id)
#   - observer.messages_failed       (counter, DELTA, labels: reason, mode, gateway_id)
#
# Thresholds inline in each `expr`. Severity maps to our two-tier setup
# (critical=P0 page, high=P1 Slack-only). Observer page/Slack routing is
# wired in Grafana contact points.

groups:
  - name: mnemom-observer-queue
    interval: 1m
    rules:

      # ─── 1. Main queue backlog > 50,000 messages (Step 52 primary alert) ──
      - alert: ObserverQueueBacklogHigh
        expr: |
          max by (gateway_id) (observer_queue_depth{queue="main"}) > 50000
        for: 5m
        labels:
          severity: high
          service: mnemom-observer
          area: observer-scale
        annotations:
          summary: Observer main queue backlog > 50k for 5m ({{ $labels.gateway_id }})
          description: |
            The observer queue (mnemom-observer-records / -staging) has
            exceeded 50,000 backlogged messages for five minutes. At 1M
            events/day (694/min) a healthy steady state holds depth near
            zero; sustained 50k+ means the consumer is not draining. Likely
            causes: consumer Worker crash-looping, Anthropic analysis API
            rate-limited, Supabase submitTrace 5xx, or a recent deploy
            regression.
          runbook_url: https://github.com/mnemom/scale/blob/main/runbooks/observer-queue-metrics.md

      # ─── 2. DLQ depth > 0 (any DLQ'd message warrants inspection) ─────────
      - alert: ObserverDLQNonEmpty
        expr: |
          max by (gateway_id) (observer_queue_depth{queue="dlq"}) > 0
        for: 10m
        labels:
          severity: high
          service: mnemom-observer
          area: observer-scale
        annotations:
          summary: Observer DLQ has {{ $value }} message(s) ({{ $labels.gateway_id }})
          description: |
            At least one message exhausted max_retries and landed in the DLQ.
            Non-zero DLQ depth sustained for 10m indicates either a poison
            message the consumer's isPoisonError classifier missed, or a
            sustained transient failure (e.g. Supabase down) that burned
            through retries. Inspect Tier 3 Worker logs for the message ID.
          runbook_url: https://github.com/mnemom/scale/blob/main/runbooks/observer-queue-metrics.md

      # ─── 3. Consumer lag > 10 minutes (oldest unacked message age) ────────
      - alert: ObserverConsumerLagHigh
        expr: |
          max by (gateway_id) (observer_consumer_lag_seconds{queue="main"}) > 600
        for: 10m
        labels:
          severity: high
          service: mnemom-observer
          area: observer-scale
        annotations:
          summary: Observer consumer lag > 10m ({{ $labels.gateway_id }})
          description: |
            Oldest unacked message in the main queue is > 10 minutes old.
            Step 53's load-test pass criterion is "all processed within 10
            minutes of generation" — this alert fires when we've breached
            that SLO. Often co-fires with ObserverQueueBacklogHigh.
          runbook_url: https://github.com/mnemom/scale/blob/main/runbooks/observer-queue-metrics.md

      # ─── 4. Poison-ack rate > 0 sustained (consumer dropping messages) ────
      - alert: ObserverPoisonAckRate
        expr: |
          sum by (gateway_id) (rate(observer_messages_failed{reason="poison"}[15m])) > 0
        for: 15m
        labels:
          severity: high
          service: mnemom-observer
          area: observer-scale
        annotations:
          summary: Observer poison-acks > 0/s sustained for 15m ({{ $labels.gateway_id }})
          description: |
            The consumer is acking messages as unrecoverable (decrypt /
            adapter / unknown-source failures) at a non-zero rate. Each
            poison-ack drops a trace permanently. Sustained poison acks
            usually mean a decryption-key mismatch on a new R2 object shape
            (rotate LOGPUSH_DECRYPT_PRIVATE_KEY or re-check the Logpush
            envelope format).
          runbook_url: https://github.com/mnemom/scale/blob/main/runbooks/observer-queue-metrics.md
