# Alert rules for the mnemom-observer queue pipeline — Step 52, ADR-032.
#
# Split into two groups by evaluation source:
#
#   - prometheus (spanmetrics): imported via Grafana Cloud → Alerting →
#       Alert rules → Import Prometheus alert rules, pointed at
#       grafanacloud-mnemom-prom. Works because the underlying series
#       (traces_spanmetrics_*) are populated by Grafana's metrics-generator
#       from the spans the observer emits on the /v1/traces route.
#
#   - traceql (Tempo metrics queries): Grafana-managed rules — cannot be
#       imported via this YAML. Create in Grafana UI: Alerting → Alert
#       rules → New alert rule → Data source = grafanacloud-mnemom-traces.
#       Paste the expression from the `traceql:` block below. Thresholds
#       and annotations carried verbatim from the Prometheus rules they
#       replace so dashboards + runbook references stay valid.
#
# Source spans emitted by observer/src/metrics.ts:
#
#   observer.queue_batch    (one per MessageBatch; attrs: env, mode,
#                            gateway_id, batch_size, processed, skipped,
#                            acks_on_missing, poison_acks, retries;
#                            status=ERROR if poison_acks > 0)
#   observer.queue_poison   (one per poison-acked message; attrs: env,
#                            mode, gateway_id, reason=poison;
#                            status=ERROR)
#   observer.queue_backlog  (one per queue per scheduled() tick; attrs:
#                            env, queue, gateway_id, depth, age_seconds)
#
# Severity maps to our two-tier setup (critical=P0 page, high=P1 Slack).

groups:
  - name: mnemom-observer-queue-prometheus
    interval: 1m
    rules:

      # ─── Poison-ack rate > 0 sustained (consumer dropping messages) ─────────
      # Works as a direct spanmetrics rate query: each poison-acked message
      # emits its own observer.queue_poison span, so the call-count rate is
      # the message rate.
      - alert: ObserverPoisonAckRate
        expr: |
          sum by (gateway_id) (
            rate(traces_spanmetrics_calls_total{
              span_name="observer.queue_poison"
            }[15m])
          ) > 0
        for: 15m
        labels:
          severity: high
          service: mnemom-observer
          area: observer-scale
        annotations:
          summary: Observer poison-acks > 0/s sustained for 15m ({{ $labels.gateway_id }})
          description: |
            The consumer is acking messages as unrecoverable (decrypt /
            adapter / unknown-source failures) at a non-zero rate. Each
            poison-ack drops a trace permanently. Sustained poison acks
            usually mean a decryption-key mismatch on a new R2 object shape
            (rotate LOGPUSH_DECRYPT_PRIVATE_KEY or re-check the Logpush
            envelope format). Note: the `gateway_id` label requires
            promotion on the metrics-generator config — until that's added,
            this alert fires with an empty `gateway_id`; the runbook
            narrows down by checking staging vs prod observer logs.
          runbook_url: https://github.com/mnemom/scale/blob/main/runbooks/observer-queue-metrics.md

# ============================================================================
# TraceQL metrics rules — create via Grafana UI, not YAML import.
# ============================================================================
#
# These three alerts evaluate gauge-style signals (queue depth, consumer lag)
# that don't map to spanmetrics call-rate semantics. They run against Tempo
# via TraceQL metrics queries and must be provisioned as Grafana-managed
# alert rules (Alerting → New alert rule → grafanacloud-mnemom-traces).
#
#   ObserverQueueBacklogHigh
#     expr:       {resource.service.name="mnemom-observer"
#                   && name="observer.queue_backlog"
#                   && span.queue="main"} | max_over_time(span.depth)
#     threshold:  > 50000
#     for:        5m
#     severity:   high
#     summary:    Observer main queue backlog > 50k for 5m
#     description same as pre-refactor: consumer not draining; likely causes
#                 are consumer crash-loop, Anthropic rate-limit, Supabase
#                 5xx, or recent deploy regression.
#
#   ObserverDLQNonEmpty
#     expr:       {resource.service.name="mnemom-observer"
#                   && name="observer.queue_backlog"
#                   && span.queue="dlq"} | max_over_time(span.depth)
#     threshold:  > 0
#     for:        10m
#     severity:   high
#     summary:    Observer DLQ has backlogged message(s)
#     description same as pre-refactor: a message exhausted max_retries or
#                 was classified as poison that evaded the isPoisonError
#                 classifier; inspect Tier 3 Worker logs for message ID.
#
#   ObserverConsumerLagHigh
#     expr:       {resource.service.name="mnemom-observer"
#                   && name="observer.queue_backlog"
#                   && span.queue="main"} | max_over_time(span.age_seconds)
#     threshold:  > 600
#     for:        10m
#     severity:   high
#     summary:    Observer consumer lag > 10m
#     description same as pre-refactor: oldest unacked message > 10 minutes
#                 old. Breaches Step 53's load-test SLO; often co-fires with
#                 ObserverQueueBacklogHigh.
#
# All three share runbook_url:
#   https://github.com/mnemom/scale/blob/main/runbooks/observer-queue-metrics.md
#
# Provisioning follow-up: move these to Terraform-managed Grafana resources
# once the refactor burns in (tracked in scale/implementation-plan.md).
