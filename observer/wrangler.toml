# ─── Shared / Inheritable ─────────────────────────────────────────────────────
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# ─── Production ───────────────────────────────────────────────────────────────
[env.production]
name = "mnemom-observer"
# CF Workers Paid Standard ($5/month) plan required: CFD analysis + OTel export per cron tick
# can exceed 10ms bundled CPU on bulk log processing. Standard plan provides 30s CPU.
usage_model = "standard"

# Opt in to workers_trace_events Logpush (ADR-026 Tier 3). Observer cron
# failures and decryption errors surface in mnemom-worker-logs R2 for
# debugging; the observer itself is the Tier 2 consumer, not emitter.
logpush = true

[env.production.triggers]
crons = ["* * * * *"]

[env.production.vars]
GATEWAY_ID = "mnemom"
OBSERVER_MAX_LOGS = "5000"
# scale/step-49: "polling" (CF AI Gateway REST) or "r2" (mnemom-gateway-logs via ADR-009).
# Default "polling" preserves pre-step-49 behavior; flip to "r2" only after Step 51
# (idempotency) lands and staging has burned in. See runbook: scale/runbooks/observability-logpush.md.
LOGPUSH_SOURCE = "polling"
OBSERVER_MAX_R2_OBJECTS = "200"

[[env.production.kv_namespaces]]
binding = "BILLING_CACHE"
id = "d13bd450c5ab4a2c9766f2dc26ce513c"

# R2 bucket binding for the Tier 2 audit stream (ADR-009, ADR-026). Observer
# reads + deletes objects from `mnemom-gateway-logs` when LOGPUSH_SOURCE="r2".
[[env.production.r2_buckets]]
binding = "GATEWAY_LOGS_BUCKET"
bucket_name = "mnemom-gateway-logs"

# Secrets (set via: wrangler secret put <NAME> --env production):
# SUPABASE_URL (op://mnemom-urls/supabase-url/credential)
# SUPABASE_SECRET_KEY (modern "sb_secret_..." format, bypass-RLS server-side role;
#   op://mnemom-api-keys/supabase-production-secret-api-key/credential. Replaces
#   the legacy JWT SUPABASE_KEY — do not re-introduce the legacy name.)
# CF_ACCOUNT_ID, CF_API_TOKEN, CF_AI_GATEWAY_URL
# ANTHROPIC_API_KEY, ANALYSIS_API_KEY
# OTLP_ENDPOINT, OTLP_AUTH
# STRIPE_SECRET_KEY, TRIGGER_SECRET
# SLACK_WEBHOOK_URL (DLQ dead-letter alerts)
# LOGPUSH_DECRYPT_PRIVATE_KEY (RSA-4096 PKCS#8 PEM; required when LOGPUSH_SOURCE="r2";
#   source: op://mnemom-api-keys/logpush-decrypt-private-key/credential — scale/step-49)
# BETTERSTACK_HEARTBEAT_URL (BS heartbeat URL for cron liveness; period=60s, grace=120s;
#   source: op://mnemom-api-keys/betterstack-heartbeat-observer-production/credential)

# ─── Staging ──────────────────────────────────────────────────────────────────
[env.staging]
name = "mnemom-observer-staging"

# See ADR-026 — opt in to workers_trace_events for Tier 3.
logpush = true

[env.staging.triggers]
crons = ["*/5 * * * *"]

[env.staging.vars]
GATEWAY_ID = "mnemom-staging"
OBSERVER_MAX_LOGS = "5000"
# scale/step-49.5 (2026-04-18): staging flipped to R2 for soak-test. Production
# stays on "polling" until Step 51 (idempotency) ships. Rolling back is a one-line
# PR on this var — see scale/runbooks/observability-logpush.md "Flipping observer to R2".
LOGPUSH_SOURCE = "r2"
OBSERVER_MAX_R2_OBJECTS = "200"

[[env.staging.kv_namespaces]]
binding = "BILLING_CACHE"
id = "2310e7878a364496b397b88540923c1f"

# Shared R2 bucket across mnemom + mnemom-staging gateways. Observer filters records
# by the plaintext `Gateway` field at ingest; per-gateway isolation enforced at
# app layer, not at bucket layer.
[[env.staging.r2_buckets]]
binding = "GATEWAY_LOGS_BUCKET"
bucket_name = "mnemom-gateway-logs"

# Secrets (set via: wrangler secret put <NAME> --env staging):
# SUPABASE_URL (op://mnemom-urls/supabase-staging-project-url/credential)
# SUPABASE_SECRET_KEY (modern "sb_secret_..." format;
#   op://mnemom-api-keys/supabase-staging-secret-api-key/credential)
# CF_ACCOUNT_ID, CF_API_TOKEN, CF_AI_GATEWAY_URL (mnemom-staging)
# ANTHROPIC_API_KEY, ANALYSIS_API_KEY
# OTLP_ENDPOINT, OTLP_AUTH
# TRIGGER_SECRET
# LOGPUSH_DECRYPT_PRIVATE_KEY (RSA-4096 PKCS#8 PEM; required when LOGPUSH_SOURCE="r2";
#   source: op://mnemom-api-keys/logpush-decrypt-private-key/credential — scale/step-49)
# BETTERSTACK_HEARTBEAT_URL (BS heartbeat URL for cron liveness; period=300s, grace=600s;
#   source: op://mnemom-api-keys/betterstack-heartbeat-observer-staging/credential)
