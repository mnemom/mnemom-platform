name: "Setup Workspace"
description: "Setup Node.js with npm cache and install dependencies"

inputs:
  workspace:
    description: "Package directory (e.g., gateway, observer, cli)"
    required: true
  node-version:
    description: "Node.js version"
    required: false
    default: "20"
  registry-url:
    description: "npm registry URL (for publishing)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"
        cache-dependency-path: ${{ inputs.workspace }}/package-lock.json
        registry-url: ${{ inputs.registry-url }}

    - name: Build shared packages
      shell: bash
      run: |
        # Build shared packages that workspaces depend on via file: references.
        # Must run before workspace npm ci so type declarations are available.
        for pkg in shared/policy-engine shared/cfd; do
          if [ -d "$pkg" ]; then
            echo "Building $pkg..."
            (cd "$pkg" && npm ci --silent && npm run build)
          fi
        done

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.workspace }}
      run: npm ci
