name: Publish

on:
  workflow_dispatch:
    inputs:
      dispatch-id:
        description: "Correlation ID from deploy orchestrator"
        required: false
        type: string
      npm-directory:
        description: "Directory containing package.json to publish"
        required: true
        type: string


permissions: {}
jobs:
  publish:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          # Node 24 ships with npm 11.5.1+ which is required for OIDC Trusted Publisher
          # publishing to work correctly.
          #
          # registry-url is needed: it creates an .npmrc with NODE_AUTH_TOKEN="". With npm
          # 11.5.1+, an empty NODE_AUTH_TOKEN causes npm to fall back to the OIDC exchange
          # automatically (using ACTIONS_ID_TOKEN_REQUEST_URL). This is the correct behavior
          # for Trusted Publisher publishing.
          #
          # With npm <11 (Node 20/22): empty NODE_AUTH_TOKEN causes E404 (npm tries to
          # auth with empty bearer token). Without registry-url at all: ENEEDAUTH (npm
          # v10 doesn't auto-detect OIDC). Node 24 + registry-url is the correct combo.
          # (History: registry-url added in #121, broke on Node 20. Node 24 fixes it.)

      - name: Install and build shared dependencies
        run: |
          for pkg in shared/policy-engine shared/safe-house; do
            if [ -d "$pkg" ]; then
              echo "Building $pkg..."
              (cd "$pkg" && npm ci --silent && npm run build)
            fi
          done

      - name: Install and build
        working-directory: ${{ inputs.npm-directory }}
        run: |
          npm ci || npm install
          npm run build --if-present

      - name: Check if already published
        id: check
        working-directory: ${{ inputs.npm-directory }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$PKG_NAME@$PKG_VERSION already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish $PKG_NAME@$PKG_VERSION"
          fi

      - name: Publish
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ inputs.npm-directory }}
        run: npm publish --access public --provenance

      - name: Generate SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom
          path: sbom.cdx.json
