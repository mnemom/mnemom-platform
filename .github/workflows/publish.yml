name: Publish

# Thin caller for the canonical npm publish recipe — see ADR-020.
# All Node version, registry-url, OIDC, provenance, and SBOM logic lives in
# mnemom/.github/.github/workflows/npm-publish.yml. To change the recipe,
# edit the canonical workflow there; do not re-add steps inline here.
#
# Publishes from this repo (selected via npm-directory input):
#   - cli/                  → @mnemom/mnemom
#   - shared/policy-engine/ → @mnemom/policy-engine
#   - shared/safe-house/    → @mnemom/safe-house
#   - shared/fault-lines/   → @mnemom/fault-lines (added UC-11b / ADR-025)
#
# Each target package's own `build` script handles building its sibling
# dependencies (e.g., cli's build runs `npm run build --prefix
# ../shared/policy-engine` first), so no shared-build preamble is needed.

on:
  workflow_dispatch:
    inputs:
      dispatch-id:
        description: "Correlation ID from deploy orchestrator"
        required: false
        type: string
      npm-directory:
        description: "Directory containing package.json to publish"
        required: true
        type: string


permissions: {}
jobs:
  publish:
    # NOTE on permissions: contents: write is over-granted relative to what
    # this dispatch-only workflow actually needs (the `gh release upload`
    # step in the reusable workflow is gated on `event_name == 'release'`
    # and never runs here). But GitHub validates the caller's declared
    # permissions against the called workflow's declared permissions at
    # workflow load time, before any `if:` is evaluated. The reusable
    # workflow declares `contents: write`; callers must grant the union.
    permissions:
      contents: write
      id-token: write
    # mnemom/.github @ scale/step-29-bump-node24-actions merge (ADR-020)
    uses: mnemom/.github/.github/workflows/npm-publish.yml@3b60e34e88113070235f2d55248a3455295be153
    with:
      npm-directory: ${{ inputs.npm-directory }}
      dispatch-id: ${{ inputs.dispatch-id || '' }}
      tag: latest
      attach-sbom-to-release: false   # dispatch path has no release to attach to
