name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  merge_group:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC - Node.js compat test

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      observer: ${{ steps.filter.outputs.observer }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'gateway/**'
              - 'shared/**'
            observer:
              - 'observer/**'
              - 'shared/**'
            cli:
              - 'cli/**'
              - 'shared/**'

  cli:
    name: CLI
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.cli == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: cli

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Run tests
        working-directory: cli
        run: npm test -- --run

  gateway:
    name: Gateway
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.gateway == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: gateway

      - name: Type check
        working-directory: gateway
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: gateway
        run: npm test -- --run

  observer:
    name: Observer
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.observer == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: observer

      - name: Type check
        working-directory: observer
        run: npx tsc --noEmit

  # Weekly Node.js compatibility matrix for CLI (18, 22)
  # Node 20 is tested on every push/PR above
  cli-compat:
    name: CLI Compat (Node ${{ matrix.node-version }})
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: cli
          node-version: ${{ matrix.node-version }}

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Run tests
        working-directory: cli
        run: npm test -- --run
