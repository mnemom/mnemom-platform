name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC - Node.js compat test


permissions: {}
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      observer: ${{ steps.filter.outputs.observer }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            gateway:
              - 'gateway/**'
              - 'shared/**'
            observer:
              - 'observer/**'
              - 'shared/**'
            cli:
              - 'cli/**'
              - 'shared/**'

  cli:
    permissions:
      contents: read
    name: CLI
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.cli == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: cli

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Run tests
        working-directory: cli
        run: npm test -- --run --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: cli
          directory: cli/coverage
          fail_ci_if_error: false

  gateway:
    permissions:
      contents: read
    name: Gateway
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.gateway == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: gateway

      - name: Build policy-engine
        working-directory: shared/policy-engine
        run: npm ci && npm run build

      - name: Type check
        working-directory: gateway
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: gateway
        run: npm test -- --run --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: gateway
          directory: gateway/coverage
          fail_ci_if_error: false

  observer:
    permissions:
      contents: read
    name: Observer
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.observer == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: observer

      - name: Build policy-engine
        working-directory: shared/policy-engine
        run: npm ci && npm run build

      - name: Type check
        working-directory: observer
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: observer
        run: npx vitest run --exclude '**/aip-integration.test.ts'

  # Notify deploy orchestrator on main/staging push
  dispatch-deploy:
    permissions:
      contents: read
    name: Trigger Deploy
    needs: [cli, gateway, observer]
    if: >-
      always() &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: mnemom

      - uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: mnemom/deploy
          event-type: deploy
          client-payload: >-
            {
              "repo": "${{ github.event.repository.name }}",
              "sha": "${{ github.sha }}",
              "environment": "${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"
            }

  deploy-context:
    name: Deploy Context
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: mnemom
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: mnemom/deploy
          path: .deploy-actions
          token: ${{ steps.app-token.outputs.token }}
          sparse-checkout: .github/actions/pr-deploy-context
      - uses: ./.deploy-actions/.github/actions/pr-deploy-context
        with:
          repo-name: ${{ github.event.repository.name }}
          github-token: ${{ github.token }}

  # Weekly Node.js compatibility matrix for CLI (18, 22)
  # Node 20 is tested on every push/PR above
  cli-compat:
    permissions:
      contents: read
    name: CLI Compat (Node ${{ matrix.node-version }})
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "22"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: cli
          node-version: ${{ matrix.node-version }}

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Run tests
        working-directory: cli
        run: npm test -- --run

  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Run linter
        run: npm run lint
        continue-on-error: true
