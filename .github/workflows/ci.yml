name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC - Node.js compat test


permissions: {}
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      observer: ${{ steps.filter.outputs.observer }}
      cli: ${{ steps.filter.outputs.cli }}
      fault_lines: ${{ steps.filter.outputs.fault_lines }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            gateway:
              - 'gateway/**'
              - 'shared/**'
            observer:
              - 'observer/**'
              - 'shared/**'
            cli:
              - 'cli/**'
              - 'shared/**'
            fault_lines:
              - 'shared/fault-lines/**'

  # ============================================================
  # Per-workspace typecheck jobs
  # ============================================================

  cli-typecheck:
    permissions:
      contents: read
    name: CLI Typecheck
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.cli == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: cli

      - name: Build policy-engine
        working-directory: shared/policy-engine
        run: npm ci && npm run build

      - name: Build (typecheck)
        working-directory: cli
        run: npm run build

  gateway-typecheck:
    permissions:
      contents: read
    name: Gateway Typecheck
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.gateway == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: gateway

      - name: Build policy-engine
        working-directory: shared/policy-engine
        run: npm ci && npm run build

      - name: Build safe-house
        working-directory: shared/safe-house
        run: npm ci && npm run build

      - name: Type check
        working-directory: gateway
        run: npx tsc --noEmit

  observer-typecheck:
    permissions:
      contents: read
    name: Observer Typecheck
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.observer == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: observer

      - name: Build policy-engine
        working-directory: shared/policy-engine
        run: npm ci && npm run build

      - name: Build safe-house
        working-directory: shared/safe-house
        run: npm ci && npm run build

      - name: Type check
        working-directory: observer
        run: npx tsc --noEmit

  # ============================================================
  # Per-workspace test jobs
  # ============================================================

  cli-test:
    permissions:
      contents: read
    name: CLI Test
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.cli == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: cli

      - name: Build policy-engine
        working-directory: shared/policy-engine
        run: npm ci && npm run build

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Run tests
        working-directory: cli
        run: npm test -- --run --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: cli
          directory: cli/coverage
          fail_ci_if_error: false

  gateway-test:
    permissions:
      contents: read
    name: Gateway Test
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.gateway == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: gateway

      - name: Build policy-engine
        working-directory: shared/policy-engine
        run: npm ci && npm run build

      - name: Build safe-house
        working-directory: shared/safe-house
        run: npm ci && npm run build

      - name: Run tests
        working-directory: gateway
        run: npm test -- --run --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: gateway
          directory: gateway/coverage
          fail_ci_if_error: false

  observer-test:
    permissions:
      contents: read
    name: Observer Test
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.observer == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: observer

      - name: Build policy-engine
        working-directory: shared/policy-engine
        run: npm ci && npm run build

      - name: Build safe-house
        working-directory: shared/safe-house
        run: npm ci && npm run build

      - name: Run tests
        working-directory: observer
        run: npx vitest run --exclude '**/aip-integration.test.ts'

  fault-lines-test:
    permissions:
      contents: read
    name: Fault-Lines Test
    needs: changes
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.fault_lines == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20"

      - name: Install
        working-directory: shared/fault-lines
        run: npm install

      - name: Typecheck
        working-directory: shared/fault-lines
        run: npm run typecheck

      - name: Build
        working-directory: shared/fault-lines
        run: npm run build

      - name: Test
        working-directory: shared/fault-lines
        run: npm test

  # ============================================================
  # Roll-up jobs — branch protection requires these names
  # ============================================================

  typecheck:
    name: Typecheck
    needs: [cli-typecheck, gateway-typecheck, observer-typecheck]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check typecheck results
        run: |
          results=("${{ needs.cli-typecheck.result }}" "${{ needs.gateway-typecheck.result }}" "${{ needs.observer-typecheck.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "Typecheck failed: $r"
              exit 1
            fi
          done
          echo "All typecheck jobs passed or were skipped"

  test:
    name: Test
    needs: [cli-test, gateway-test, observer-test, fault-lines-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          results=("${{ needs.cli-test.result }}" "${{ needs.gateway-test.result }}" "${{ needs.observer-test.result }}" "${{ needs.fault-lines-test.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "Test failed: $r"
              exit 1
            fi
          done
          echo "All test jobs passed or were skipped"

  # ============================================================
  # Deploy dispatch + context
  # ============================================================

  # Notify deploy orchestrator on main/staging push
  dispatch-deploy:
    permissions:
      contents: read
    name: Trigger Deploy
    needs: [typecheck, test]
    if: >-
      always() &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v2
        id: app-token
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: mnemom

      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: mnemom/deploy
          event-type: deploy
          client-payload: >-
            {
              "repo": "${{ github.event.repository.name }}",
              "sha": "${{ github.sha }}",
              "environment": "${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"
            }

  deploy-context:
    name: Deploy Context
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v2
        id: app-token
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: mnemom
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: mnemom/deploy
          path: .deploy-actions
          token: ${{ steps.app-token.outputs.token }}
          sparse-checkout: .github/actions/pr-deploy-context
      - uses: ./.deploy-actions/.github/actions/pr-deploy-context
        with:
          repo-name: ${{ github.event.repository.name }}
          github-token: ${{ github.token }}

  # Weekly Node.js compatibility matrix for CLI (18, 22)
  # Node 20 is tested on every push/PR above
  cli-compat:
    permissions:
      contents: read
    name: CLI Compat (Node ${{ matrix.node-version }})
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "22"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: cli
          node-version: ${{ matrix.node-version }}

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Run tests
        working-directory: cli
        run: npm test -- --run

  semgrep:
    permissions:
      contents: read
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Semgrep (fail on HIGH severity)
        run: semgrep scan --config p/default --severity ERROR --error --exclude '*__tests__*' --exclude '*test*' gateway/ observer/

  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "20"
      - run: npm ci
      - name: Run linter
        run: npm run lint
        continue-on-error: true
