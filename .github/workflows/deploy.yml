name: Deploy Production (manual fallback)

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-gateway:
    name: Deploy Gateway
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: gateway

      - name: Build policy-engine
        working-directory: shared/policy-engine
        run: npm ci && npm run build

      - name: Type check
        working-directory: gateway
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: gateway
        run: npm test -- --run

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: gateway
          command: deploy --env production

  deploy-observer:
    name: Deploy Observer
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: observer

      - name: Build policy-engine
        working-directory: shared/policy-engine
        run: npm ci && npm run build

      - name: Type check
        working-directory: observer
        run: npx tsc --noEmit

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: observer
          command: deploy --env production

  publish-cli:
    name: Publish CLI
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: cli
          registry-url: "https://registry.npmjs.org"

      - name: Check if version already published
        id: version-check
        working-directory: cli
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @mnemom/smoltbot version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "CLI v$LOCAL already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Publishing CLI v$LOCAL (npm has v$REMOTE)"
          fi

      - name: Build
        if: steps.version-check.outputs.skip != 'true'
        working-directory: cli
        run: npm run build

      - name: Publish
        if: steps.version-check.outputs.skip != 'true'
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
