name: Deploy Staging (manual fallback)

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy-gateway:
    name: Deploy Gateway (Staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: gateway

      - name: Type check
        working-directory: gateway
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: gateway
        run: npm test -- --run

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: gateway
          command: deploy --env staging

  deploy-observer:
    name: Deploy Observer (Staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
        with:
          workspace: observer

      - name: Type check
        working-directory: observer
        run: npx tsc --noEmit

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: observer
          command: deploy --env staging
