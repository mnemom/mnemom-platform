name: Helm Lint

on:
  push:
    paths:
      - 'deploy/helm/**'
  pull_request:
    paths:
      - 'deploy/helm/**'


permissions: {}
jobs:
  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint chart
        run: helm lint deploy/helm/mnemom-gateway/

      - name: Template chart
        run: |
          helm template test deploy/helm/mnemom-gateway/ \
            --set secrets.supabaseKey=test \
            --set secrets.anthropicApiKey=test \
            --set secrets.licenseJwt=test \
            --debug
