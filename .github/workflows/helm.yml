name: Helm Lint

on:
  push:
    paths:
      - 'deploy/helm/**'
  pull_request:
    paths:
      - 'deploy/helm/**'


permissions: {}
jobs:
  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Lint chart
        run: helm lint deploy/helm/mnemom-gateway/

      - name: Template chart
        run: |
          helm template test deploy/helm/mnemom-gateway/ \
            --set secrets.supabaseKey=test \
            --set secrets.anthropicApiKey=test \
            --set secrets.licenseJwt=test \
            --debug
